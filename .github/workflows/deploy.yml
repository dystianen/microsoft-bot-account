name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          port: 22
          script: powershell -Command "Set-Location 'C:\Users\Administrator\source\bot-microsoft-account'; git fetch origin main; git reset --hard origin/main; npm install --production; pm2 restart ecosystem.config.js; pm2 save"